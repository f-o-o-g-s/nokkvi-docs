<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 100 100">
  <style>
    .accent { fill: var(--sl-color-accent); }
    .foreground { fill: var(--sl-color-white); }
  </style>
  <!-- Boat Hull -->
  <path class="foreground" d="M20,65 L80,65 L70,80 L30,80 Z" />
  <!-- Sail -->
  <path class="foreground" d="M48,20 L48,60 L25,60 Z" />
  <!-- Visualizer Bars (Simplified for small icon) -->
  <rect class="accent" x="52" y="30" width="4" height="30" rx="1" />
  <rect class="accent" x="58" y="20" width="4" height="40" rx="1" />
  <rect class="accent" x="64" y="35" width="4" height="25" rx="1" />
  <rect class="accent" x="70" y="25" width="4" height="35" rx="1" />
</svg>
